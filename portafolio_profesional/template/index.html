<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolios Profesionales - UCC Pasto</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn { display: block; padding: 15px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: #2980b9; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Portafolios de Ingeniería de Software</h1>
        <p>Electiva I - Frameworks Web - UCC Campus Pasto</p>
        <div class="grid">
            <a href="/dev1/" class="btn">Camilo Toro (Dev 1)</a>
            <a href="/dev2/" class="btn">Integrante 2 (Dev 2)</a>
            <a href="/dev3/" class="btn">Integrante 3 (Dev 3)</a>
            <a href="/dev4/" class="btn">Andrés Miranda (Dev 4)</a>
        </div>
    </div>
</body>
</html>
